<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRO Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 1.5rem; font-weight: 600; color: #f8fafc; }
        header p { color: #94a3b8; margin-top: 0.5rem; font-size: 0.875rem; }
        .status-banner {
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.125rem;
            font-weight: 600;
        }
        .status-operational { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
        .status-degraded { background: #713f12; color: #fde68a; border: 1px solid #854d0e; }
        .status-major { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
        .status-investigating { background: #713f12; color: #fde68a; border: 1px solid #854d0e; }
        .status-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        .dot-green { background: #34d399; }
        .dot-yellow { background: #fbbf24; }
        .dot-red { background: #f87171; }
        h2 { font-size: 1.125rem; color: #f8fafc; margin-bottom: 1rem; }
        .incident { background: #1e293b; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.75rem; border-left: 3px solid #475569; }
        .incident-date { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; }
        .incident-title { font-weight: 600; color: #e2e8f0; text-transform: capitalize; }
        .incident-body { font-size: 0.875rem; color: #94a3b8; margin-top: 0.25rem; }
        .no-incidents { color: #64748b; font-style: italic; }
        footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #1e293b; }
        footer a { color: #34d399; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        footer p { font-size: 0.75rem; color: #475569; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Trading Risk Officer &mdash; System Status</h1>
            <p>Real-time system status for <a href="https://tradingriskofficer.com" style="color:#34d399;">tradingriskofficer.com</a></p>
        </header>

        <!-- STATUS_BANNER -->
        <div class="status-banner status-operational">
            <span class="status-dot dot-green"></span>
            All Systems Operational
        </div>
        <!-- /STATUS_BANNER -->

        <h2>Recent Incidents</h2>

        <!-- INCIDENTS -->
        <p class="no-incidents">No recent incidents.</p>
        <!-- /INCIDENTS -->

        <footer>
            <a href="https://tradingriskofficer.com">&larr; Back to TRO</a>
            <p>Last updated: <!-- LAST_UPDATED -->--<!-- /LAST_UPDATED --></p>
        </footer>
    </div>
</body>
</html>
